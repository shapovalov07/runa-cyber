services:
  runa-cyber-club:
    image: ${DOCKER_IMAGE:-runa-cyber-club:prod}
    container_name: runa-cyber-club
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: 3030
      HOSTNAME: 0.0.0.0
    expose:
      - "3030"
    volumes:
      # Server-only runtime storage keeps CMS data and uploaded media across deploys.
      - ./.runtime/server-cms:/app/data/cms
      - ./.runtime/server-uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: proxy
